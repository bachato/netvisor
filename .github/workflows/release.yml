name: Release

on:
  release:
    types: [published]

permissions: {}

jobs:
  test-and-update-fixtures:
    name: Run Tests and Update Fixtures
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install tbls
        run: |
          curl -sL https://github.com/k1LoW/tbls/releases/download/v1.79.3/tbls_v1.79.3_linux_amd64.tar.gz | tar xz
          sudo mv tbls /usr/local/bin/
          tbls version

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "$AGENT_TOOLSDIRECTORY"
          docker system prune -af --volumes
          df -h
                  
      - name: Generate UI fixtures before container build
        run: make generate-fixtures

      - name: Run all tests
        run: |
          make dev-down
          rm -rf ./data/daemon_config/*
          export DATABASE_URL="postgresql://postgres:password@localhost:5432/scanopy_test"
          cd backend && cargo test --features generate-fixtures -- --nocapture --test-threads=1

      - name: Show container logs on test failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs
          docker compose -f docker-compose.test.yml ps
          
      - name: Cleanup containers
        if: always()
        run: make dev-down
      
      - name: Commit and push fixture updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/Cargo.toml backend/Cargo.lock ui/package.json ui/package-lock.json
          git add backend/src/tests/scanopy.sql backend/src/tests/daemon_config.json ui/static/services.json ui/static/schema.mermaid ui/static/schema-er.mermaid ui/static/entity-metadata.json
          git add backend/tests/integration/compat/fixtures/

          if git diff --staged --quiet; then
            echo "No fixture changes to commit"
          else
            BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
            git commit -m "chore: update test fixtures for release ${{ github.event.release.tag_name }}"
            git push origin "$BRANCH_NAME"
            echo "✅ Pushed fixture updates to $BRANCH_NAME"
          fi

      - name: Upload generated UI fixtures
        uses: actions/upload-artifact@v4
        with:
          name: ui-fixtures
          path: ui/src/lib/data/*.json
          retention-days: 1

  migration-branch-test:
    name: Test migrations on Neon branch
    runs-on: ubuntu-latest
    needs: test-and-update-fixtures
    permissions:
      contents: read
    outputs:
      deploy_mode: ${{ steps.deploy_mode.outputs.mode }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Parse deploy mode from release body
        id: deploy_mode
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          if echo "$RELEASE_BODY" | grep -iq '^Deploy-Mode:[[:space:]]*downtime'; then
            MODE=downtime
          else
            MODE=backward-compatible
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          {
            echo "## Deploy mode"
            echo ""
            echo "Resolved to: \`$MODE\`"
            if [ "$MODE" = "downtime" ]; then
              echo ""
              echo "Release body declared \`Deploy-Mode: downtime\` — the backward-compat container harness and DB-enum coexistence tests will be skipped. Built images will be labeled \`org.scanopy.deploy_mode=downtime\` for the deployer."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compute branch expiration (24h safety net)
        run: echo "EXPIRES_AT=$(date -u -d '+1 day' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon branch off prod
        id: create_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: release/${{ github.event.release.tag_name }}-migration-check
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Snapshot schema before migrations
        run: pg_dump --schema-only --no-owner --no-privileges "$DATABASE_URL" > /tmp/before.sql
        env:
          DATABASE_URL: ${{ steps.create_branch.outputs.db_url }}

      - name: Apply migrations
        working-directory: backend
        run: sqlx migrate run
        env:
          DATABASE_URL: ${{ steps.create_branch.outputs.db_url }}

      - name: Snapshot schema after migrations and write diff to job summary
        run: |
          pg_dump --schema-only --no-owner --no-privileges "$DATABASE_URL" > /tmp/after.sql
          {
            echo "## Migration schema delta — ${{ github.event.release.tag_name }}"
            echo ""
            if diff -q /tmp/before.sql /tmp/after.sql >/dev/null; then
              echo "_No schema changes were applied._"
            else
              echo '```diff'
              diff -u /tmp/before.sql /tmp/after.sql || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          DATABASE_URL: ${{ steps.create_branch.outputs.db_url }}

      - name: Log in to GHCR for compat-check image pull
        if: steps.deploy_mode.outputs.mode != 'downtime'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backward-compat container harness (prev release vs migrated schema)
        if: steps.deploy_mode.outputs.mode != 'downtime'
        id: compat_check
        env:
          DATABASE_URL: ${{ steps.create_branch.outputs.db_url }}
        run: |
          set +e
          bash backend/scripts/compat-check.sh "$DATABASE_URL" "ghcr.io/${{ github.repository }}/server:latest" | tee /tmp/compat-check.log
          RC=${PIPESTATUS[0]}
          set -e
          {
            echo "## Backward-compat container harness"
            echo ""
            STATUS_LINE=$(grep '^COMPAT_STATUS=' /tmp/compat-check.log | tail -1 || true)
            if [ -n "$STATUS_LINE" ]; then
              echo "$STATUS_LINE"
            else
              echo "No COMPAT_STATUS emitted; see raw log below."
            fi
            echo ""
            echo '<details><summary>Raw log</summary>'
            echo ''
            echo '```'
            cat /tmp/compat-check.log
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$RC"

      - name: DB-enum coexistence tests
        if: steps.deploy_mode.outputs.mode != 'downtime'
        env:
          DATABASE_URL: ${{ steps.create_branch.outputs.db_url }}
        working-directory: backend
        run: |
          cargo test --lib \
            test_current_reads_previous_release_variants \
            test_current_writes_subset_of_previous_release \
            -- --ignored

      - name: Delete Neon branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: release/${{ github.event.release.tag_name }}-migration-check
          api_key: ${{ secrets.NEON_API_KEY }}

  build-binaries:
    name: Build Daemon Binaries
    runs-on: ${{ matrix.os }}
    needs: test-and-update-fixtures
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: scanopy-daemon-linux-amd64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: scanopy-daemon-linux-arm64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: scanopy-daemon-darwin-amd64
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: scanopy-daemon-darwin-arm64
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: scanopy-daemon-windows-amd64.exe
            use_cross: false
    
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest changes
        shell: bash
        run: |
          git fetch origin ${{ github.event.release.target_commitish }}
          git reset --hard origin/${{ github.event.release.target_commitish }}
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          targets: ${{ matrix.target }}

      - name: Install Npcap SDK
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile "$env:TEMP\npcap-sdk.zip"
          Expand-Archive -Path "$env:TEMP\npcap-sdk.zip" -DestinationPath "$env:TEMP\npcap-sdk"
          echo "LIB=$env:TEMP\npcap-sdk\Lib\x64" >> $env:GITHUB_ENV
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          key: ${{ matrix.target }}
      
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross
      
      - name: Build daemon
        working-directory: backend
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --bin daemon --target ${{ matrix.target }}
          else
            cargo build --release --bin daemon --target ${{ matrix.target }}
          fi
      
      - name: Prepare binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp backend/target/${{ matrix.target }}/release/daemon.exe ${{ matrix.binary }}
          else
            cp backend/target/${{ matrix.target }}/release/daemon ${{ matrix.binary }}
            chmod +x ${{ matrix.binary }}
          fi
      
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          retention-days: 1

  # ============================================
  # Docker builds - parallelized by image type
  # ============================================
  
  build-docker-server-community:
    name: Build Server (Community)
    runs-on: ${{ matrix.runner }}
    needs: [build-binaries, test-and-update-fixtures, migration-branch-test]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest changes
        run: |
          git fetch origin ${{ github.event.release.target_commitish }}
          git reset --hard origin/${{ github.event.release.target_commitish }}

      - name: Download generated UI fixtures
        uses: actions/download-artifact@v4
        with:
          name: ui-fixtures
          path: ui/src/lib/data/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            PUBLIC_SERVER_HOSTNAME=default
            PUBLIC_SERVER_PORT=60072
          tags: |
            ghcr.io/${{ github.repository }}/server:${{ github.event.release.tag_name }}-${{ matrix.suffix }}
          labels: |
            org.scanopy.deploy_mode=${{ needs.migration-branch-test.outputs.deploy_mode }}
          cache-from: type=gha,scope=server-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=server-${{ matrix.suffix }}

  build-docker-server-commercial:
    name: Build Server (Commercial)
    runs-on: ${{ matrix.runner }}
    needs: [build-binaries, test-and-update-fixtures, migration-branch-test]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest changes
        run: |
          git fetch origin ${{ github.event.release.target_commitish }}
          git reset --hard origin/${{ github.event.release.target_commitish }}

      - name: Download generated UI fixtures
        uses: actions/download-artifact@v4
        with:
          name: ui-fixtures
          path: ui/src/lib/data/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            PUBLIC_SERVER_HOSTNAME=default
            PUBLIC_SERVER_PORT=60072
            CARGO_FEATURES=commercial
          tags: |
            ghcr.io/${{ github.repository }}/server-commercial:${{ github.event.release.tag_name }}-${{ matrix.suffix }}
          labels: |
            org.scanopy.deploy_mode=${{ needs.migration-branch-test.outputs.deploy_mode }}
          cache-from: type=gha,scope=server-commercial-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=server-commercial-${{ matrix.suffix }}

  build-docker-daemon:
    name: Build Daemon Docker
    runs-on: ubuntu-latest
    needs: [build-binaries, migration-branch-test]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest changes
        run: |
          git fetch origin ${{ github.event.release.target_commitish }}
          git reset --hard origin/${{ github.event.release.target_commitish }}
      
      - name: Download Linux amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: scanopy-daemon-linux-amd64
          path: backend/
      
      - name: Download Linux arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: scanopy-daemon-linux-arm64
          path: backend/
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.daemon
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/daemon:${{ github.event.release.tag_name }}
          labels: |
            org.scanopy.deploy_mode=${{ needs.migration-branch-test.outputs.deploy_mode }}

  # ============================================
  # Create multi-arch manifests for server images
  # ============================================
  
  create-manifests:
    name: Create Multi-arch Manifests
    runs-on: ubuntu-latest
    needs: [build-docker-server-community, build-docker-server-commercial, build-docker-daemon]
    permissions:
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create manifest for Server Community (GHCR)
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository }}/server:${{ github.event.release.tag_name }} \
            ghcr.io/${{ github.repository }}/server:${{ github.event.release.tag_name }}-amd64 \
            ghcr.io/${{ github.repository }}/server:${{ github.event.release.tag_name }}-arm64
      
      - name: Create manifest for Server Commercial (GHCR)
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository }}/server-commercial:${{ github.event.release.tag_name }} \
            ghcr.io/${{ github.repository }}/server-commercial:${{ github.event.release.tag_name }}-amd64 \
            ghcr.io/${{ github.repository }}/server-commercial:${{ github.event.release.tag_name }}-arm64

  upload-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [build-binaries, create-manifests]
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            scanopy-daemon-*/scanopy-daemon-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  regenerate-db-enum-baseline:
    name: Regenerate DB-enum baseline for next release cycle
    runs-on: ubuntu-latest
    needs: [create-manifests]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Regenerate baseline
        working-directory: backend
        run: cargo test --lib regenerate_db_enum_baseline -- --ignored --nocapture

      - name: Check for fixture changes
        id: diff
        working-directory: backend
        run: |
          if git diff --quiet tests/fixtures/db_enum_baseline.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with refreshed baseline
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        working-directory: backend
        run: |
          BRANCH="chore/regen-db-enum-baseline-${{ github.event.release.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add tests/fixtures/db_enum_baseline.json
          git commit -m "chore: regenerate db_enum_baseline for ${{ github.event.release.tag_name }}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: regenerate db_enum_baseline for ${{ github.event.release.tag_name }}" \
            --body "Automated baseline refresh after ${{ github.event.release.tag_name }} was published. Merges the new set of DB-backed enum variants into the baseline so the next release cycle's coexistence checks compare against the just-released binary.$'\n\n'Review: confirm the diff matches the enum changes in this release. If a rename shipped with a \`#[serde(alias)]\`, keep the old name in the fixture manually." \
            --base dev \
            --head "$BRANCH"

      - name: Summary
        run: |
          {
            echo "## DB-enum baseline"
            echo ""
            if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
              echo "Baseline changed — PR opened against \`dev\`."
            else
              echo "No baseline changes (no DB-backed enum variants added/removed in this release)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
