name: UI CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/ui-ci.yml'
  pull_request:
    paths:
      - 'ui/**'
      - '.github/workflows/ui-ci.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: ./ui

jobs:
  lint-and-test:
    name: ui-lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Cache generated fixtures
        id: fixture-cache
        uses: actions/cache@v4
        with:
          path: ui/src/lib/data/
          key: ui-fixtures-${{ hashFiles('backend/src/**', 'backend/Cargo.toml', 'backend/Cargo.lock') }}

      - name: Install Rust
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Cache Rust dependencies
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install system dependencies
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Generate fixtures
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        working-directory: .
        run: cd backend && cargo run --release --bin generate-fixtures

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check formatting
        run: npm run format -- --check
      
      - name: Lint
        run: npm run lint
      
      - name: Type check
        run: npm run check
      
      - name: Build
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ui-build
          path: ui/build/
          retention-days: 7
