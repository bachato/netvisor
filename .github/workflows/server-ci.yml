name: Server CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/src/server.rs'
      - 'backend/src/server/**'
      - 'backend/src/*.rs'
      - 'backend/*'
      - 'backend/migrations/**'
      - 'backend/scripts/lint-migrations.sh'
      - '.squawk.toml'
      - '.github/workflows/server-ci.yml'
  pull_request:
    paths:
      - 'backend/src/server.rs'
      - 'backend/src/server/**'
      - 'backend/src/*.rs'
      - 'backend/*'
      - 'backend/migrations/**'
      - 'backend/scripts/lint-migrations.sh'
      - '.squawk.toml'
      - '.github/workflows/server-ci.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: ./backend

jobs:
  test:
    name: server-lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      
      - name: Check formatting
        run: cargo fmt -- --check
      
      - name: Clippy server
        run: cargo clippy --bin server --all-features -- -D warnings
      
      - name: Test server binary
        run: cargo test --lib

      - name: Install squawk
        run: npm install -g squawk-cli@2.47.0

      - name: Lint migrations
        run: ./scripts/lint-migrations.sh

      - name: Build server (release)
        run: cargo build --release --bin server

  migration-backward-compat:
    name: Migration backward-compat (prev release vs migrated schema)
    runs-on: ubuntu-latest
    # Only run when migration files actually changed. Skipping for code-only PRs
    # keeps the Neon-branch + docker-pull cost out of the common path.
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect migration file changes
        id: changes
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || 'main' }}"
          git fetch --no-tags --depth=200 origin "$BASE_REF" || git fetch --no-tags --depth=200 origin "refs/heads/$BASE_REF"
          MERGE_BASE=$(git merge-base HEAD "origin/$BASE_REF" 2>/dev/null || echo "")
          if [ -z "$MERGE_BASE" ]; then
            echo "Could not compute merge base; running check conservatively."
            echo "migrations_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$MERGE_BASE"...HEAD -- 'backend/migrations/**' | grep -q .; then
            echo "migrations_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "migrations_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notice
        if: steps.changes.outputs.migrations_changed != 'true'
        run: echo "No migration files changed in this PR — skipping backward-compat harness." >> "$GITHUB_STEP_SUMMARY"

      - name: Compute branch expiration (1h)
        if: steps.changes.outputs.migrations_changed == 'true'
        run: echo "EXPIRES_AT=$(date -u -d '+1 hour' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon branch off prod
        if: steps.changes.outputs.migrations_changed == 'true'
        id: create_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: pr/${{ github.event.pull_request.number || github.run_id }}-migration-check
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Install sqlx-cli
        if: steps.changes.outputs.migrations_changed == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Apply migrations
        if: steps.changes.outputs.migrations_changed == 'true'
        working-directory: backend
        run: sqlx migrate run
        env:
          DATABASE_URL: ${{ steps.create_branch.outputs.db_url }}

      - name: Log in to GHCR
        if: steps.changes.outputs.migrations_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backward-compat container harness
        if: steps.changes.outputs.migrations_changed == 'true'
        env:
          DATABASE_URL: ${{ steps.create_branch.outputs.db_url }}
        run: |
          set +e
          bash backend/scripts/compat-check.sh "$DATABASE_URL" "ghcr.io/${{ github.repository }}/server:latest" | tee /tmp/compat-check.log
          RC=${PIPESTATUS[0]}
          set -e
          {
            echo "## Backward-compat container harness"
            echo ""
            grep '^COMPAT_STATUS=' /tmp/compat-check.log | tail -1 || echo "No COMPAT_STATUS emitted."
            echo ""
            echo '<details><summary>Raw log</summary>'
            echo ''
            echo '```'
            cat /tmp/compat-check.log
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$RC"

      - name: Delete Neon branch
        if: always() && steps.changes.outputs.migrations_changed == 'true'
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: pr/${{ github.event.pull_request.number || github.run_id }}-migration-check
          api_key: ${{ secrets.NEON_API_KEY }}
