# squawk — Postgres migration linter
# Rules map to the guidelines in /Users/maya/dev/infra/docs/migration-guidelines.md.
# The pre-20260501 cutoff is enforced by backend/scripts/lint-migrations.sh, not here.

# sqlx wraps each migration in a transaction by default (unless the file starts
# with the `-- no-transaction` header). Without this, squawk false-positives on
# rules that only matter outside a transaction.
assume_in_transaction = true

# Match the Neon Postgres version we deploy against.
pg_version = "17.0.0"

excluded_rules = [
    # Populate only after verifying against a known-bad test migration.
    # Every entry must carry an inline comment explaining why the rule is disabled.
]
